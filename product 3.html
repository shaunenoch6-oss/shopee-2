<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ShopEase</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-store"></i>
        <span>ShopEase</span>
    </div>

    <div class="header-links">
        <a href="index.html">Home</a>
        <a href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>

</header>

<section class="product-details">

    <div class="product-image">
        <img src="audio.jpg" alt="Gaming Mouse">
    </div>

    <div class="product-info">

        <h1>Redragon H510 Zeus Wired Gaming Headset</h1>

        <div class="rating">
            ⭐⭐⭐⭐⭐
            <span>(325 Reviews)</span>
        </div>

        <h2 class="price">₱3,994</h2>

        <p>
            RGB WIRED GAMING HEADSET Enjoy the real clear and lossless sound quality with 7.1 Surround-Sound technology, creating a field of immersion wherever in-game field, listening to an alive concert, or in a chat room.
        </p>

        <div class="quantity">

            <button id="minus">-</button>

            <input type="number" id="qty" value="1" min="1">

            <button id="plus">+</button>

        </div>

        <br>

        <button class="buy-btn">
            Buy Now
        </button>

        <button class="cart-btn">
            Add to Cart
        </button>

    </div>

</section>

<script src="product.js"></script>

</body>
</html>
